services:
  mysql:
    image: mysql:8.0
    container_name: spark-employment-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-spark_employment}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    container_name: spark-employment-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

  backend:
    build:
      context: ..
      dockerfile: deployment/backend.Dockerfile
    container_name: spark-employment-backend
    environment:
      SERVER_PORT: 8082
      MYSQL_JDBC_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-spark_employment}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      REDIS_HOST: redis
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - redis

  frontend:
    build:
      context: ..
      dockerfile: deployment/frontend.Dockerfile
    container_name: spark-employment-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8082/api}

volumes:
  mysql_data:
